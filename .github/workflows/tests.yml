name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e . pytest

      - name: Run tests
        run: pytest tests/ -v

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check .
